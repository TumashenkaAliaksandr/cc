{% extends 'main/base.html' %}

{% block content %}

    <div class="container py-5">

        <div class="card shadow">

            <div class="card-body">

                <h2>Edit Profile</h2>

                <form method="post"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit"
                            class="btn btn-primary">
                        Save
                    </button>

                </form>

            </div>

        </div>

    </div>

{% endblock %}
