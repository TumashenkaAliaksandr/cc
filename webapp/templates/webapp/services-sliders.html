{% load static %}

<section id="services" class="container-fluid py-5">

    <div class="text-center mb-5">
        <h1 class="service-title-main">✓ Popular Home Repair Services</h1>
        <p class="service-title-p">
            🔎︎ Find the right specialist for any type of work
        </p>
    </div>

    <div class="swiper servicesSwiper">

        <div class="swiper-wrapper">

            {% for service in more_services %}

                <div class="swiper-slide">

                    <div class="card h-100 shadow-sm border-0">

                        <div class="position-relative">

                            <img src="{{ service.image.url }}"
                                 class="card-img-top"
                                 alt="{{ service.name }}">
                            <div class="service-like">
                                {{ service.like }}
                            </div>

                        </div>

                        <div class="card-body">

                            <h6 class="fw-bold mb-2">
                                {{ service.name }}
                            </h6>

                            <p class="small text-muted">
                                {{ service.short_description }}
                            </p>

                        </div>

                        <div class="card-footer bg-white border-0">

                            <div class="d-flex justify-content-between align-items-center">

                                <a href="#"
                                   class="btn btn-sm btn-outline-primary">
                                    🔍︎ Search
                                </a>

                                <div class="service-icon">
                                    {% if service.icon %}
                                        <img src="{{ service.icon.url }}" class="cart-icon" alt="icon">
                                    {% endif %}
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            {% endfor %}

        </div>

        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>

    </div>

</section>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        new Swiper('.servicesSwiper', {

            slidesPerView: 7,
            spaceBetween: 15,

            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },

            loop: true,

            autoplay: {
                delay: 4000,
                disableOnInteraction: false,
            },

            breakpoints: {

                320: {
                    slidesPerView: 1
                },

                576: {
                    slidesPerView: 2
                },

                768: {
                    slidesPerView: 3
                },

                992: {
                    slidesPerView: 5
                },

                1200: {
                    slidesPerView: 6
                },

                1400: {
                    slidesPerView: 7
                }

            }

        });

    });
</script>
